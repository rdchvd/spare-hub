name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint & tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sparehub_user
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sparehub_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sparehub_user -d sparehub_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: sparehub_db
      DB_USER: sparehub_user
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt ruff==0.6.9 black==24.8.0

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Django system check
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Django tests
        run: python manage.py test

  frontend:
    name: Frontend (lint, types & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: TypeScript
        run: npm run typecheck

      - name: Production build
        run: npm run build
